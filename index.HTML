<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carting Student Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    padding:20px;
    overflow-x:hidden;
}

/* ANIMATION */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glow{
    0%{
        box-shadow:0 0 5px #38bdf8;
    }
    50%{
        box-shadow:0 0 20px #38bdf8;
    }
    100%{
        box-shadow:0 0 5px #38bdf8;
    }
}

/* LOGIN */

.login-box{
    width:380px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:35px;
    border-radius:20px;
    margin:60px auto;
    color:white;
    animation:fadeIn 1s ease;
    border:1px solid rgba(255,255,255,0.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    font-size:30px;
}

.login-box input,
.login-box select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
    font-size:15px;
}

.login-box input::placeholder{
    color:#ddd;
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    animation:glow 2s infinite;
}

.login-box button:hover{
    transform:scale(1.03);
}

/* DASHBOARD */

.dashboard{
    display:none;
    animation:fadeIn 1s ease;
}

.topbar{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:18px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{
    font-size:30px;
}

.logout-btn{
    width:auto;
    padding:12px 25px;
    background:#ef4444;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
}

/* FORM */

.form-box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:18px;
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr 220px;
    gap:15px;
}

.form-grid input{
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.form-grid button{
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.form-grid button:hover{
    transform:translateY(-3px);
}

/* TABLE */

.table-box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:18px;
    overflow:hidden;
    animation:fadeIn 1s ease;
}

table{
    width:100%;
    border-collapse:collapse;
    color:white;
}

th{
    background:#38bdf8;
    padding:18px;
    font-size:18px;
}

td{
    padding:18px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    vertical-align:top;
}

.name-box{
    background:rgba(255,255,255,0.12);
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:fadeIn 0.5s ease;
}

.small-btn{
    width:auto;
    padding:6px 12px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin-left:5px;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#ef4444;
}

.user-note{
    margin-top:15px;
    color:#4ade80;
    font-weight:600;
}

/* MOBILE */

@media(max-width:768px){

.login-box{
    width:100%;
}

.form-grid{
    grid-template-columns:1fr;
}

.topbar{
    flex-direction:column;
    gap:15px;
    text-align:center;
}

table{
    font-size:14px;
}

}

</style>

</head>
<body>

<!-- LOGIN -->

<div class="login-box" id="loginPage">

    <h2>Carting Login</h2>

    <select id="role">
        <option value="admin">Admin</option>
        <option value="user">User</option>
    </select>

    <input type="text" id="username" placeholder="Enter ID">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

    <div class="topbar">

        <h1 id="dashboardTitle">Dashboard</h1>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <!-- ADMIN PANEL -->

    <div class="form-box" id="adminPanel">

        <div class="form-grid">

            <input type="date" id="date">

            <input type="text" id="studentName"
            placeholder="Enter Student Name">

            <button onclick="addStudent()">
                Add Student
            </button>

        </div>

    </div>

    <!-- TABLE -->

    <div class="table-box">

        <table>

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Students</th>
                </tr>
            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <p class="user-note" id="userMessage"></p>

</div>

<script>

let currentRole = "";
let studentData = {};

function loadStudentData(){
    let savedData = localStorage.getItem("studentData");
    if(savedData){
        try{
            studentData = JSON.parse(savedData) || {};
        }
        catch(e){
            studentData = {};
        }
    }
}

function saveStudentData(){
    localStorage.setItem("studentData", JSON.stringify(studentData));
}

loadStudentData();

// LOGIN

function login(){

    let role = document.getElementById("role").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // ADMIN LOGIN

    if(
        role === "admin" &&
        username === "101" &&
        password === "kiss"
    ){

        currentRole = "admin";

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("dashboardTitle").innerHTML =
        "Admin Dashboard";

        renderTable();

    }

    // USER LOGIN

    else if(
        role === "user" &&
        username === "102" &&
        password === "miss"
    ){

        currentRole = "user";

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("dashboardTitle").innerHTML =
        "User Dashboard";

        document.getElementById("userMessage").innerHTML =
        ;

        renderTable();

    }

    else{

        alert("Invalid Login");

    }

}

// LOGOUT

function logout(){

    location.reload();

}

// ADD STUDENT

function addStudent(){

    let date = document.getElementById("date").value;
    let name = document.getElementById("studentName").value;

    if(date === "" || name === ""){

        alert("Fill All Fields");
        return;

    }

    if(!studentData[date]){

        studentData[date] = [];

    }

    studentData[date].push(name);

    saveStudentData();
    renderTable();

    document.getElementById("date").value = "";
    document.getElementById("studentName").value = "";

}

// RENDER TABLE

function renderTable(){

    let tableBody = document.getElementById("tableBody");

    tableBody.innerHTML = "";

    for(let date in studentData){

        let row = document.createElement("tr");

        let dateCell = document.createElement("td");
        dateCell.innerHTML = date;

        let nameCell = document.createElement("td");

        studentData[date].forEach((student,index)=>{

            let box = document.createElement("div");

            box.classList.add("name-box");

            if(currentRole === "admin"){

                box.innerHTML = `
                    <span>${student}</span>

                    <div>

                        <button class="small-btn edit-btn"
                        onclick="editStudent('${date}',${index})">
                        Edit
                        </button>

                        <button class="small-btn delete-btn"
                        onclick="deleteStudent('${date}',${index})">
                        Delete
                        </button>

                    </div>
                `;

            }

            else{

                box.innerHTML = `
                    <span>${student}</span>
                `;

            }

            nameCell.appendChild(box);

        });

        row.appendChild(dateCell);
        row.appendChild(nameCell);

        tableBody.appendChild(row);

    }

}

// EDIT

function editStudent(date,index){

    let currentName = studentData[date][index];

    let newName = prompt("Edit Name", currentName);

    if(newName){

        studentData[date][index] = newName;

        saveStudentData();
        renderTable();

    }

}

// DELETE

function deleteStudent(date,index){

    studentData[date].splice(index,1);

    if(studentData[date].length === 0){

        delete studentData[date];

    }

    saveStudentData();
    renderTable();

}

</script>

</body>
</html>
